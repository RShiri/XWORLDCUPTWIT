<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Match Dashboard — WC2026 (redesign sample)</title>
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script>var _v=Date.now();document.write('<link rel="stylesheet" href="styles.css?v='+_v+'"><link rel="stylesheet" href="match.css?v='+_v+'"><link rel="stylesheet" href="dash-sample.css?v=1">');</script>
<noscript><link rel="stylesheet" href="styles.css" /><link rel="stylesheet" href="match.css" /><link rel="stylesheet" href="dash-sample.css" /></noscript>
</head>
<body>
<header class="site">
  <div class="header-inner">
    <div class="brand">
      <div class="title">FIFA World Cup <span>2026</span> · Match Centre</div>
      <div class="sub">Interactive shot &amp; pass explorer</div>
    </div>
    <nav class="tabs">
      <a class="back-link" href="sample.html">← All matches</a>
    </nav>
  </div>
</header>

<main>
  <div id="matchRoot">
    <p class="footer-note" id="loadingMsg">Loading match…</p>
  </div>
</main>

<div class="tooltip" id="tooltip"></div>

<!-- data.js gives match.js the head-to-head team stats; the match-specific
     event file is injected by match.js based on ?id= -->
<script>var _mv=Date.now();
  document.write('<scr'+'ipt src="data.js?v='+_mv+'"></scr'+'ipt>');
  document.write('<scr'+'ipt src="match.js?v='+_mv+'"></scr'+'ipt>');</script>
</body>
</html>
